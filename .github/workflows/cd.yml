name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_smoke:
        description: 'Skip post-deploy smoke checks for this manual run'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  CONFIGURATION: Release
  PUBLISH_ARTIFACT_NAME: webapp-publish
  PUBLISH_DIRECTORY: ${{ github.workspace }}/artifacts/publish
  WEB_PROJECT_PATH: src/PetHealthManagement.Web/PetHealthManagement.Web.csproj

jobs:
  build-test-publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Dotnet info
        run: dotnet --info

      - name: Build
        run: bash ./scripts/build.sh --configuration Release

      - name: Full test suite
        run: bash ./scripts/test.sh --configuration Release --no-build

      - name: Playwright E2E tests
        run: bash ./scripts/test-e2e.sh --configuration Release --install-browsers

      - name: Publish web app
        run: dotnet publish "$WEB_PROJECT_PATH" -c "$CONFIGURATION" -o "$PUBLISH_DIRECTORY" --no-build

      - name: Upload publish artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PUBLISH_ARTIFACT_NAME }}
          path: ${{ env.PUBLISH_DIRECTORY }}
          if-no-files-found: error
          retention-days: 14

  deploy-production:
    needs: build-test-publish
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate deployment configuration
        shell: bash
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
          SKIP_SMOKE: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_smoke == 'true' }}
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_IMAGE_URL: ${{ vars.SMOKE_TEST_IMAGE_URL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
        run: |
          [[ -n "$APP_BASE_URL" ]] || { echo "Missing production environment variable APP_BASE_URL"; exit 1; }
          [[ -n "$AZURE_WEBAPP_NAME" ]] || { echo "Missing production environment variable AZURE_WEBAPP_NAME"; exit 1; }
          [[ -n "$AZURE_CLIENT_ID" ]] || { echo "Missing production secret AZURE_CLIENT_ID"; exit 1; }
          [[ -n "$AZURE_TENANT_ID" ]] || { echo "Missing production secret AZURE_TENANT_ID"; exit 1; }
          [[ -n "$AZURE_SUBSCRIPTION_ID" ]] || { echo "Missing production secret AZURE_SUBSCRIPTION_ID"; exit 1; }

          if [[ "$SKIP_SMOKE" != "true" ]]; then
            [[ -n "$SMOKE_TEST_EMAIL" ]] || { echo "Missing production secret SMOKE_TEST_EMAIL"; exit 1; }
            [[ -n "$SMOKE_TEST_PASSWORD" ]] || { echo "Missing production secret SMOKE_TEST_PASSWORD"; exit 1; }
          else
            echo "Skipping smoke test configuration validation for this manual run."
          fi

      - name: Download publish artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.PUBLISH_ARTIFACT_NAME }}
          path: ${{ env.PUBLISH_DIRECTORY }}

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ${{ env.PUBLISH_DIRECTORY }}

      - name: Post-deploy smoke checks
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_smoke == 'true') }}
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
          SMOKE_TEST_IMAGE_URL: ${{ vars.SMOKE_TEST_IMAGE_URL }}
        run: |
          SMOKE_ARGS=(
            --use-existing-app
            --base-url "$APP_BASE_URL"
            --email "$SMOKE_TEST_EMAIL"
            --password "$SMOKE_TEST_PASSWORD"
            --timeout 180
          )

          if [[ -n "${SMOKE_TEST_IMAGE_URL:-}" ]]; then
            SMOKE_ARGS+=(--image-url "$SMOKE_TEST_IMAGE_URL")
          fi

          bash ./scripts/local-smoke.sh "${SMOKE_ARGS[@]}"
