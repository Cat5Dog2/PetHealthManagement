name: Production Admin Seed

on:
  workflow_dispatch:
    inputs:
      seed_demo_data:
        description: "Also seed demo users, pets, health logs, schedules, and visits"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      confirm:
        description: "Type seed-production-admin, or seed-production-admin-with-demo-data when seed_demo_data is true"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-admin-seed
  cancel-in-progress: false

env:
  CONFIGURATION: Release
  WEB_PROJECT_PATH: src/PetHealthManagement.Web/PetHealthManagement.Web.csproj

jobs:
  seed-production-admin:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Validate admin seed configuration
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_KEY_VAULT_NAME: ${{ vars.AZURE_KEY_VAULT_NAME }}
          AZURE_SQL_CONNECTION_SECRET_NAME: ${{ vars.AZURE_SQL_CONNECTION_SECRET_NAME }}
          CONFIRM: ${{ inputs.confirm }}
          DATA_PROTECTION_BLOB_URI: ${{ vars.DATA_PROTECTION_BLOB_URI }}
          DATA_PROTECTION_KEY_VAULT_KEY_IDENTIFIER: ${{ vars.DATA_PROTECTION_KEY_VAULT_KEY_IDENTIFIER }}
          PRODUCTION_ADMIN_ENV_FILE: ${{ secrets.PRODUCTION_ADMIN_ENV_FILE }}
          SEED_DEMO_DATA: ${{ inputs.seed_demo_data }}
          STORAGE_ROOT_PATH: ${{ vars.STORAGE_ROOT_PATH }}
        run: |
          [[ "$GITHUB_REF" == "refs/heads/main" ]] || { echo "Run this workflow from main only."; exit 1; }
          if [[ "$SEED_DEMO_DATA" == "true" ]]; then
            [[ "$CONFIRM" == "seed-production-admin-with-demo-data" ]] || { echo "confirm input must be seed-production-admin-with-demo-data when seed_demo_data is true"; exit 1; }
          else
            [[ "$CONFIRM" == "seed-production-admin" ]] || { echo "confirm input must be seed-production-admin"; exit 1; }
          fi
          [[ -n "$AZURE_CLIENT_ID" ]] || { echo "Missing production secret AZURE_CLIENT_ID"; exit 1; }
          [[ -n "$AZURE_TENANT_ID" ]] || { echo "Missing production secret AZURE_TENANT_ID"; exit 1; }
          [[ -n "$AZURE_SUBSCRIPTION_ID" ]] || { echo "Missing production secret AZURE_SUBSCRIPTION_ID"; exit 1; }
          [[ -n "$AZURE_KEY_VAULT_NAME" ]] || { echo "Missing production variable AZURE_KEY_VAULT_NAME"; exit 1; }
          [[ -n "$AZURE_SQL_CONNECTION_SECRET_NAME" ]] || { echo "Missing production variable AZURE_SQL_CONNECTION_SECRET_NAME"; exit 1; }
          [[ -n "$STORAGE_ROOT_PATH" ]] || { echo "Missing production variable STORAGE_ROOT_PATH"; exit 1; }
          [[ -n "$DATA_PROTECTION_BLOB_URI" ]] || { echo "Missing production variable DATA_PROTECTION_BLOB_URI"; exit 1; }
          [[ -n "$DATA_PROTECTION_KEY_VAULT_KEY_IDENTIFIER" ]] || { echo "Missing production variable DATA_PROTECTION_KEY_VAULT_KEY_IDENTIFIER"; exit 1; }
          [[ -n "$PRODUCTION_ADMIN_ENV_FILE" ]] || { echo "Missing production secret PRODUCTION_ADMIN_ENV_FILE"; exit 1; }

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Retrieve production connection string
        shell: bash
        env:
          AZURE_KEY_VAULT_NAME: ${{ vars.AZURE_KEY_VAULT_NAME }}
          AZURE_SQL_CONNECTION_SECRET_NAME: ${{ vars.AZURE_SQL_CONNECTION_SECRET_NAME }}
        run: |
          CONNECTION_STRING=$(az keyvault secret show \
            --vault-name "$AZURE_KEY_VAULT_NAME" \
            --name "$AZURE_SQL_CONNECTION_SECRET_NAME" \
            --query value \
            --output tsv)
          [[ -n "$CONNECTION_STRING" ]] || { echo "The Key Vault secret is empty."; exit 1; }
          echo "::add-mask::$CONNECTION_STRING"
          echo "PRODUCTION_CONNECTION_STRING=$CONNECTION_STRING" >> "$GITHUB_ENV"

      - name: Write production admin .env
        shell: bash
        env:
          PRODUCTION_ADMIN_ENV_FILE: ${{ secrets.PRODUCTION_ADMIN_ENV_FILE }}
          SEED_DEMO_DATA: ${{ inputs.seed_demo_data }}
        run: |
          umask 077
          printf '%s\n' "$PRODUCTION_ADMIN_ENV_FILE" > "$GITHUB_WORKSPACE/.env"

          grep -Eq '^(export[[:space:]]+)?(DevelopmentSetup__AdminEmail|DevelopmentSetup:AdminEmail|ADMIN_EMAIL|PRODUCTION_ADMIN_EMAIL)=' "$GITHUB_WORKSPACE/.env" \
            || { echo "PRODUCTION_ADMIN_ENV_FILE must define the Admin email."; exit 1; }
          grep -Eq '^(export[[:space:]]+)?(DevelopmentSetup__AdminPassword|DevelopmentSetup:AdminPassword|ADMIN_PASSWORD|PRODUCTION_ADMIN_PASSWORD)=' "$GITHUB_WORKSPACE/.env" \
            || { echo "PRODUCTION_ADMIN_ENV_FILE must define the Admin password."; exit 1; }
          if [[ "$SEED_DEMO_DATA" == "true" ]]; then
            grep -Eq '^(export[[:space:]]+)?(DevelopmentSetup__DemoUserPassword|DevelopmentSetup:DemoUserPassword|DEMO_USER_PASSWORD|PRODUCTION_DEMO_USER_PASSWORD)=' "$GITHUB_WORKSPACE/.env" \
              || { echo "PRODUCTION_ADMIN_ENV_FILE must define the demo user password when seed_demo_data is true."; exit 1; }
          fi

      - name: Build
        run: bash ./scripts/build.sh --configuration Release

      - name: Seed production account and optional demo data
        shell: bash
        env:
          ASPNETCORE_ENVIRONMENT: Production
          ConnectionStrings__DefaultConnection: ${{ env.PRODUCTION_CONNECTION_STRING }}
          DOTNET_ENV_FILE: ${{ github.workspace }}/.env
          Storage__RootPath: ${{ vars.STORAGE_ROOT_PATH }}
          DataProtection__ApplicationName: ${{ vars.DATA_PROTECTION_APPLICATION_NAME }}
          DataProtection__BlobUri: ${{ vars.DATA_PROTECTION_BLOB_URI }}
          DataProtection__KeyVaultKeyIdentifier: ${{ vars.DATA_PROTECTION_KEY_VAULT_KEY_IDENTIFIER }}
          DataProtection__ManagedIdentityClientId: ${{ vars.DATA_PROTECTION_MANAGED_IDENTITY_CLIENT_ID }}
          SEED_DEMO_DATA: ${{ inputs.seed_demo_data }}
        run: |
          export DataProtection__ApplicationName="${DataProtection__ApplicationName:-PetHealthManagement.Web}"

          if [[ "$SEED_DEMO_DATA" == "true" ]]; then
            SETUP_ARGUMENT="--seed-demo-data"
            SETUP_DESCRIPTION="production account and demo data"
          else
            SETUP_ARGUMENT="--seed-admin"
            SETUP_DESCRIPTION="production account"
          fi

          for attempt in 1 2 3 4 5; do
            echo "Seeding ${SETUP_DESCRIPTION}... attempt ${attempt}/5"

            if dotnet run --project "$WEB_PROJECT_PATH" -c "$CONFIGURATION" --no-build --no-launch-profile -- "$SETUP_ARGUMENT"; then
              echo "Seed completed successfully."
              exit 0
            fi

            if [[ "$attempt" == "5" ]]; then
              echo "Seed failed after 5 attempts."
              exit 1
            fi

            echo "Seed attempt ${attempt} failed. Waiting 60 seconds before retry..."
            sleep 60
          done

      - name: Remove production admin .env
        if: always()
        run: rm -f "$GITHUB_WORKSPACE/.env"
