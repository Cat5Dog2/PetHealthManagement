version: 2
updates:
  - package-ecosystem: "nuget"
    directories:
      - "/src/**"
      - "/tests/**"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    target-branch: "main"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Tokyo"
    target-branch: "main"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "dotnet-sdk"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "10:00"
      timezone: "Asia/Tokyo"
    target-branch: "main"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "deps"
      include: "scope"
